---
- name: ensure wireshark is at the latest version
  yum:
    name: wireshark
    state: latest

- name: Create a directory
  file:
    path: "/home/ec2-user/my_folder"
    state: directory
    mode: "755"

- name: Create a file inside the directory
  file:
    path: "/home/ec2-user/my_folder/my_file.txt"
    state: touch
    mode: "644"

- name: Change timezone on all servers
  timezone:
    name: Africa/Lagos

- name: Run a shell script
  shell: |
    echo "Hello from Ansible" > /home/ec2-user/my_folder/output.txt