- name: update web, nfs and db servers
  hosts: webservers, nfs, db
  remote_user: ec2-user
  become: true
  become_user: root
  tasks:
    - name: ensure wireshark is at the latest version
      yum:
        name: wireshark
        state: latest

- name: update LB server
  hosts: lb
  remote_user: ubuntu
  become: true
  become_user: root
  tasks:
    - name: Update apt repo
      apt:
        update_cache: yes

    - name: ensure wireshark is at the latest version
      apt:
        name: wireshark
        state: latest

- name: Create a directory, file, change timezone and run a shell script on server
  hosts: webservers, nfs, db
  remote_user: ec2-user
  become: true
  become_user: root
  tasks:
    - name: Create a directory
      file:
        path: /home/ubuntu/my_folder
        state: directory
        mode: "755"

    - name: Create a file inside the directory
      file:
        path: /home/ubuntu/my_folder/my_file.txt
        state: touch
        mode: "644"

    - name: Change timezone on all servers
      timezone:
        name: Africa/Lagos

    - name: Run a shell script
      shell: |
        echo "Hello from Ansible" > /home/ubuntu/my_folder/output.txt
